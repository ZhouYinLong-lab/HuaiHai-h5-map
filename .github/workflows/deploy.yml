name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# 允许 Actions 写入 GitHub Pages 并获取 id-token（用于 OIDC 部署认证）
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行，避免并发冲突
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build
        env:
          VITE_AMAP_KEY: ${{ secrets.VITE_AMAP_KEY }}
          VITE_AMAP_SECURITY_JS_CODE: ${{ secrets.VITE_AMAP_SECURITY_JS_CODE }}

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
